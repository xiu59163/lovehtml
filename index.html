<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valentine's Day - 給你的專屬訊息</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google 浪漫字體 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+TC:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* 全域樣式 */
      body {
        font-family: "Noto Serif TC", serif;
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* 浪漫氛圍背景 */
      .bg-decor {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 182, 193, 0.15) 0%,
          rgba(255, 255, 255, 0) 60%
        );
        z-index: -1;
      }

      /* 玻璃擬物化卡片 */
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(255, 105, 135, 0.1);
        padding: 2rem;
        transition: all 0.3s ease;
      }

      @media (min-width: 768px) {
        .glass-card {
          padding: 3rem;
        }
      }

      .title-font {
        font-family: "Dancing Script", "Noto Serif TC", cursive;
        color: #d81b60;
      }

      /* -------------------------------------
           告白截圖專用頁面 (Result Overlay)
           ------------------------------------- */
      #resultOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #2a0845 0%, #6441a5 100%);
        z-index: 1050;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1s ease-in-out;
        padding: 20px;
        text-align: center;
      }

      #resultOverlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .result-content {
        max-width: 600px;
        width: 100%;
        animation: slideUp 1s ease-out forwards;
        transform: translateY(30px);
      }

      @keyframes slideUp {
        to {
          transform: translateY(0);
        }
      }

      /* 名字標註效果 */
      .highlight-name {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        color: #fff;
        text-shadow:
          0 0 10px rgba(255, 105, 135, 0.8),
          0 0 20px rgba(255, 105, 135, 0.5);
        margin-bottom: 1.5rem;
        display: block;
      }

      .highlight-name::before {
        content: "To: ";
        font-family: "Dancing Script", cursive;
        color: #ffb6c1;
        font-size: 0.8em;
      }

      /* 告白內文 */
      .confession-text {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        color: #f8f9fa;
        line-height: 1.8;
        letter-spacing: 2px;
        margin-bottom: 3rem;
        white-space: pre-wrap;
      }

      .floating-heart {
        font-size: 2.5rem;
        color: #ff4081;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
        100% {
          transform: translateY(0px);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-decor"></div>

    <!-- 1. 表單輸入區域 -->
    <main
      class="container min-vh-100 d-flex align-items-center justify-content-center py-5"
      id="formSection"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="glass-card">
            <div class="text-center mb-4">
              <div class="floating-heart mb-2">❤️</div>
              <h2 class="title-font fw-bold">Valentine's Day</h2>
              <p class="text-muted mt-2">
                情人節快到了，你有想對誰說一句話嗎？
              </p>
            </div>

            <!-- 串接 Formspree ID: xeeyqbek -->
            <form
              id="confessionForm"
              action="https://formspree.io/f/xeeyqbek"
              method="POST"
            >
              <div class="mb-3">
                <label class="form-label fw-bold text-secondary"
                  >想對誰說 (對方的名字)</label
                >
                <input
                  type="text"
                  class="form-control form-control-lg"
                  name="targetName"
                  id="targetName"
                  placeholder="例如：林小明"
                  required
                  data-fs-field
                />
                <span
                  class="text-danger small"
                  data-fs-error="targetName"
                ></span>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-secondary"
                  >你的 Email (僅供系統驗證)</label
                >
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  placeholder="example@email.com"
                  required
                  data-fs-field
                />
                <span class="text-danger small" data-fs-error="email"></span>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold text-secondary"
                  >你想說的話</label
                >
                <textarea
                  class="form-control"
                  name="message"
                  id="message"
                  rows="4"
                  placeholder="把平時不敢說的話，寫在這裡吧..."
                  required
                  data-fs-field
                ></textarea>
                <span class="text-danger small" data-fs-error="message"></span>
              </div>

              <!-- 全域錯誤提示框 -->
              <div class="alert alert-danger d-none mb-3" data-fs-error></div>

              <div class="d-grid gap-2">
                <!-- data-fs-submit-btn 會在送出時自動變 disabled 狀態 -->
                <button
                  type="submit"
                  class="btn btn-danger btn-lg rounded-pill fw-bold shadow-sm"
                  data-fs-submit-btn
                >
                  產生專屬告白畫面
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- 2. 截圖專用華麗畫面 -->
    <section id="resultOverlay">
      <div class="result-content">
        <span class="highlight-name" id="displayTargetName"></span>
        <div class="confession-text" id="displayMessage"></div>
        <div class="mt-4">
          <span class="text-white-50" style="font-size: 0.9rem"
            >— Valentine's Day 2026 —</span
          >
        </div>
      </div>
    </section>

    <!-- 引入 Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Formspree 官方 AJAX SDK -->
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>

    <!-- 核心邏輯 -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("confessionForm");
        const resultOverlay = document.getElementById("resultOverlay");
        const displayTargetName = document.getElementById("displayTargetName");
        const displayMessage = document.getElementById("displayMessage");

        // 1. 初始化 Formspree 官方 AJAX 機制
        window.formspree =
          window.formspree ||
          function () {
            (formspree.q = formspree.q || []).push(arguments);
          };

        formspree("initForm", {
          formElement: "#confessionForm",
          formId: "xeeyqbek",
          // 當傳送成功後，會執行此 callback 函式
          onSuccess: function () {
            handleSubmissionSuccess();
          },
        });

        // 2. 處理傳送成功後的邏輯
        function handleSubmissionSuccess() {
          const targetName = document.getElementById("targetName").value;
          const message = document.getElementById("message").value;

          // 本地暫存（Localhost 暫存）
          localStorage.setItem("confessionTarget", targetName);
          localStorage.setItem("confessionMessage", message);

          // 更新告白頁面 DOM
          displayTargetName.textContent = targetName;
          displayMessage.textContent = message;

          // 平滑淡入華麗告白頁
          resultOverlay.classList.add("show");
          document.body.style.overflow = "hidden"; // 鎖定滾動條以利截圖
        }
      });
    </script>
  </body>
</html>
