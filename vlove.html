<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valentine's Day - 給你的專屬訊息</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- 引入 Google 字體 (Noto Serif TC 提供優雅的中文字體，Dancing Script 提供浪漫的英文字體) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Serif+TC:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* 全域設定 */
      body {
        font-family: "Noto Serif TC", serif;
        /* 浪漫漸層背景 */
        background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* 背景動態裝飾 (愛心氛圍) */
      .bg-decor {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 182, 193, 0.15) 0%,
          rgba(255, 255, 255, 0) 60%
        );
        z-index: -1;
      }

      /* 玻璃擬物化卡片設計 (表單區) */
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(255, 105, 135, 0.1);
        padding: 2rem;
        transition: transform 0.3s ease;
      }

      /* 響應式微調：大螢幕時增加卡片內距 */
      @media (min-width: 768px) {
        .glass-card {
          padding: 3rem;
        }
      }

      .title-font {
        font-family: "Dancing Script", "Noto Serif TC", cursive;
        color: #d81b60;
      }

      /* -------------------------------------
           告白截圖專用頁面 (Result Overlay)
           ------------------------------------- */
      #resultOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* 華麗的深色浪漫漸層，讓文字更顯眼 */
        background: linear-gradient(135deg, #2a0845 0%, #6441a5 100%);
        z-index: 1050;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1s ease-in-out;
        padding: 20px;
        text-align: center;
      }

      /* 觸發顯示的 Class */
      #resultOverlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      /* 截圖頁面的文字排版 */
      .result-content {
        max-width: 600px;
        width: 100%;
        animation: slideUp 1s ease-out forwards;
        transform: translateY(30px);
      }

      @keyframes slideUp {
        to {
          transform: translateY(0);
        }
      }

      /* 名字高亮/標註效果 (螢光筆質感) */
      .highlight-name {
        font-size: clamp(2rem, 5vw, 3.5rem); /* RWD 字體大小 */
        font-weight: 700;
        color: #fff;
        /* 文字發光效果 */
        text-shadow:
          0 0 10px rgba(255, 105, 135, 0.8),
          0 0 20px rgba(255, 105, 135, 0.5);
        margin-bottom: 1.5rem;
        display: block;
      }

      .highlight-name::before {
        content: "To: ";
        font-family: "Dancing Script", cursive;
        color: #ffb6c1;
        font-size: 0.8em;
      }

      /* 告白內文 */
      .confession-text {
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        color: #f8f9fa;
        line-height: 1.8;
        letter-spacing: 2px;
        margin-bottom: 3rem;
        white-space: pre-wrap; /* 保留換行符號 */
      }

      /* 小裝飾 */
      .floating-heart {
        font-size: 2rem;
        color: #ff4081;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
        100% {
          transform: translateY(0px);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-decor"></div>

    <!-- 1. 表單輸入區域 (主畫面) -->
    <main
      class="container min-vh-100 d-flex align-items-center justify-content-center py-5"
      id="formSection"
    >
      <div class="row w-100 justify-content-center">
        <!-- RWD 限制：手機佔滿，平板佔 8 格，電腦佔 6 格 -->
        <div class="col-12 col-md-8 col-lg-6">
          <div class="glass-card">
            <div class="text-center mb-4">
              <div class="floating-heart mb-2">❤️</div>
              <h2 class="title-font fw-bold">Valentine's Day</h2>
              <p class="text-muted mt-2">
                情人節快到了，你有想對誰說一句話嗎？
              </p>
            </div>

            <!-- 替換成你的 Formspree action 網址 -->
            <form
              id="confessionForm"
              action="Https://formspree.io/f/xeeyqbek"
              method="POST"
            >
              <div class="mb-3">
                <label class="form-label fw-bold text-secondary"
                  >想對誰說 (對方的名字)</label
                >
                <input
                  type="text"
                  class="form-control form-control-lg"
                  name="targetName"
                  id="targetName"
                  placeholder="例如：林小明"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold text-secondary"
                  >你的 Email (僅供系統驗證)</label
                >
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  placeholder="example@email.com"
                  required
                />
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold text-secondary"
                  >你想說的話</label
                >
                <textarea
                  class="form-control"
                  name="message"
                  id="message"
                  rows="4"
                  placeholder="把平時不敢說的話，寫在這裡吧..."
                  required
                ></textarea>
              </div>

              <div class="d-grid gap-2">
                <button
                  type="submit"
                  class="btn btn-danger btn-lg rounded-pill fw-bold shadow-sm"
                  id="submitBtn"
                >
                  產生專屬告白畫面
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- 2. 截圖專用華麗畫面 (預設隱藏) -->
    <section id="resultOverlay">
      <div class="result-content">
        <span class="highlight-name" id="displayTargetName"></span>
        <div class="confession-text" id="displayMessage"></div>
        <div class="mt-4">
          <span class="text-white-50" style="font-size: 0.9rem"
            >— Valentine's Day 2026 —</span
          >
        </div>
      </div>
    </section>

    <!-- 引入 Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 核心邏輯腳本 -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("confessionForm");
        const submitBtn = document.getElementById("submitBtn");
        const resultOverlay = document.getElementById("resultOverlay");

        // DOM 元素：用來顯示截圖畫面的資料
        const displayTargetName = document.getElementById("displayTargetName");
        const displayMessage = document.getElementById("displayMessage");

        // 檢查是否已有暫存資料 (重新整理頁面時可選擇是否直接顯示)
        // if(localStorage.getItem('confessionTarget')) { console.log('有歷史暫存'); }

        form.addEventListener("submit", async (e) => {
          // 1. 阻止表單預設的跳轉行為
          //   e.preventDefault();

          // 2. 取得輸入資料
          const formData = new FormData(form);
          const targetName = formData.get("targetName");
          const message = formData.get("message");

          // 3. 儲存到 localStorage (本機暫存)
          localStorage.setItem("confessionTarget", targetName);
          localStorage.setItem("confessionMessage", message);

          // 4. UI 狀態改變：按鈕鎖定，顯示 loading
          const originalBtnText = submitBtn.innerHTML;
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 傳送中...';

          // 5. 使用 Fetch API 背景傳送資料給 Formspree
          try {
            const response = await fetch(form.action, {
              method: form.method,
              body: formData,
              headers: {
                Accept: "application/json",
              },
            });

            if (response.ok) {
              // 傳送成功，觸發華麗畫面
              showGorgeousResult(targetName, message);
            } else {
              // 處理 Formspree 阻擋或錯誤
              alert("傳送至信箱失敗，但我們還是可以生成畫面給您截圖！");
              showGorgeousResult(targetName, message);
            }
          } catch (error) {
            console.error("Fetch error:", error);
            // 即使網路錯誤（例如擋廣告外掛），依然讓使用者能截圖
            showGorgeousResult(targetName, message);
          } finally {
            // 恢復按鈕狀態 (雖然已經被全螢幕蓋住了)
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnText;
          }
        });

        // 顯示華麗截圖畫面的函數
        function showGorgeousResult(name, msg) {
          // 將資料塞入截圖畫面的 DOM 中
          displayTargetName.textContent = name;
          displayMessage.textContent = msg;

          // 加上 class 觸發 CSS 動畫與顯示
          resultOverlay.classList.add("show");

          // 可選：隱藏原本的滾動條，讓截圖更乾淨
          document.body.style.overflow = "hidden";
        }
      });
    </script>
  </body>
</html>
